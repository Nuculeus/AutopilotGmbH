version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - autopilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  paperclip:
    build:
      context: ./paperclip
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      PAPERCLIP_DEPLOYMENT_MODE: ${PAPERCLIP_DEPLOYMENT_MODE:-authenticated}
      PAPERCLIP_DEPLOYMENT_EXPOSURE: ${PAPERCLIP_DEPLOYMENT_EXPOSURE:-private}
      PAPERCLIP_AUTH_DISABLE_SIGN_UP: ${PAPERCLIP_AUTH_DISABLE_SIGN_UP:-true}
      PAPERCLIP_ALLOWED_HOSTNAMES: ${PAPERCLIP_ALLOWED_HOSTNAMES:-paperclip}
      INTERNAL_BRIDGE_SECRET: ${INTERNAL_BRIDGE_SECRET}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy

  wrapper:
    image: node:22-alpine
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      PAPERCLIP_INTERNAL_URL: ${PAPERCLIP_INTERNAL_URL:-http://paperclip:8080}
      PAPERCLIP_API_URL: ${PAPERCLIP_API_URL:-http://paperclip:8080}
      INTERNAL_BRIDGE_SECRET: ${INTERNAL_BRIDGE_SECRET}
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm build && pnpm start --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - ./wrapper:/app
    depends_on:
      postgres:
        condition: service_healthy
      paperclip:
        condition: service_started

volumes:
  autopilot_postgres_data:
